[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	wnatth3/WiFiManager@2.0.16-rc.2
	adafruit/Adafruit NeoPixel@^1.11.0
	arduino-libraries/Arduino_JSON@^0.2.0
	akkoyun/RV3028@^1.4.0
	akkoyun/I2C_Functions@1.8.8
